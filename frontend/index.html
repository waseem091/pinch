<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinch – Hand Tracking</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#000; overflow:hidden; cursor:pointer; font-family:monospace; }

  #overlay {
    position:fixed; top:12px; left:12px; z-index:10;
    color:#0f0; font-size:13px; pointer-events:none;
    text-shadow:0 0 6px #0f0;
  }
  #overlay div { margin:2px 0; }

  #tap-msg {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    color:#fff; font-size:30px; font-family:sans-serif;
    z-index:20; pointer-events:none; text-align:center;
    text-shadow:0 2px 12px #000;
  }
  #tap-msg small { display:block; font-size:14px; margin-top:8px; color:#aaa; }
</style>
</head>
<body>

<div id="overlay">
  <div id="out-status">OUT: --</div>
  <div id="hand-status">Hands: --</div>
  <div id="fps-status">FPS: --</div>
  <div id="ws-url" style="color:#888;font-size:10px;max-width:260px;word-break:break-all;"></div>
</div>
<div id="tap-msg">
  TAP TO START
  <small>WebXR Hand Tracking</small>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.181.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.181.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';

// ---------------------------------------------------------------------------
// WebSocket destination.
// Priority: ?ws=<url> query param → permanent Cloudflare Worker relay.
// ---------------------------------------------------------------------------
const DEFAULT_WS = 'wss://pinch-relay.jenil-panchal10.workers.dev/ws';
const params = new URLSearchParams(location.search);
const WS_URL = params.get('ws') || DEFAULT_WS;

// Persistent robot identity — generated once per device, survives reloads.
function getRobotId() {
  let id = localStorage.getItem('pinch-robot-id');
  if (!id) {
    id = 'robot-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
    localStorage.setItem('pinch-robot-id', id);
  }
  return id;
}
const ROBOT_ID = getRobotId();

document.getElementById('ws-url').textContent = 'WS: ' + WS_URL;

let ws = null;
let frameCount = 0;

function connectWS() {
  try {
    ws = new WebSocket(WS_URL);
  } catch (e) {
    document.getElementById('out-status').textContent = 'OUT: bad URL';
    return;
  }
  ws.onopen  = () => { document.getElementById('out-status').textContent = 'OUT: connected'; };
  ws.onerror = () => { document.getElementById('out-status').textContent = 'OUT: error'; };
  ws.onclose = () => {
    document.getElementById('out-status').textContent = 'OUT: reconnecting…';
    setTimeout(connectWS, 2000);
  };
}

connectWS();

function sendHandData(payload) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    try { ws.send(JSON.stringify(payload)); } catch (_) {}
  }
}

// Heartbeat: once a second, report page/session state.
let xrActive = false;
let lastHandCounts = { left: 0, right: 0 };
setInterval(() => {
  sendHandData({
    type: 'status',
    robotId: ROBOT_ID,
    ts: Date.now(),
    xr: xrActive,
    left: lastHandCounts.left,
    right: lastHandCounts.right,
  });
}, 1000);

// ---------------------------------------------------------------------------
// Three.js / WebXR setup
// ---------------------------------------------------------------------------
const renderer = new THREE.WebGLRenderer({
  antialias: false, stencil: false, depth: true,
  powerPreference: 'high-performance', alpha: true,
});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 50);
camera.position.set(0, 1.6, 3);
scene.add(camera);
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));

// Hidden AR button – tapping the page clicks it.
const xrButton = ARButton.createButton(renderer, { optionalFeatures: ['hand-tracking'] });
xrButton.style.display = 'none';
document.body.appendChild(xrButton);

document.body.addEventListener('click', () => {
  document.getElementById('tap-msg').style.display = 'none';
  xrButton.click();
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// getHand() registers the hand with the XR session; we don't attach models.
renderer.xr.getHand(0);
renderer.xr.getHand(1);

renderer.xr.addEventListener('sessionstart', () => { xrActive = true; });
renderer.xr.addEventListener('sessionend',   () => { xrActive = false; });

// ---------------------------------------------------------------------------
// 25 canonical WebXR joint names (order matches the payload spec)
// ---------------------------------------------------------------------------
// Note: the WebXR thumb has no "intermediate" phalanx — 4 joints, not 5.
const JOINTS = [
  'wrist',
  'thumb-metacarpal','thumb-phalanx-proximal','thumb-phalanx-distal','thumb-tip',
  'index-finger-metacarpal','index-finger-phalanx-proximal','index-finger-phalanx-intermediate','index-finger-phalanx-distal','index-finger-tip',
  'middle-finger-metacarpal','middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate','middle-finger-phalanx-distal','middle-finger-tip',
  'ring-finger-metacarpal','ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate','ring-finger-phalanx-distal','ring-finger-tip',
  'pinky-finger-metacarpal','pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal','pinky-finger-tip',
];

// Bone connectivity (index pairs into JOINTS) for the skeleton lines.
const BONES = [
  [0,1],[1,2],[2,3],[3,4],            // thumb
  [0,5],[5,6],[6,7],[7,8],[8,9],      // index
  [0,10],[10,11],[11,12],[12,13],[13,14], // middle
  [0,15],[15,16],[16,17],[17,18],[18,19], // ring
  [0,20],[20,21],[21,22],[22,23],[23,24], // pinky
];

// ---------------------------------------------------------------------------
// Visible skeleton: 25 joint spheres + bone lines per hand
// ---------------------------------------------------------------------------
function makeSkeleton(color) {
  const group = new THREE.Group();
  group.visible = false;

  const sphereGeo = new THREE.SphereGeometry(0.008, 8, 8);
  const sphereMat = new THREE.MeshBasicMaterial({ color });
  const spheres = [];
  for (let i = 0; i < JOINTS.length; i++) {
    const s = new THREE.Mesh(sphereGeo, sphereMat);
    s.visible = false;
    group.add(s);
    spheres.push(s);
  }

  const linePositions = new Float32Array(BONES.length * 2 * 3);
  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
  const lines = new THREE.LineSegments(lineGeo, new THREE.LineBasicMaterial({ color }));
  lines.frustumCulled = false;
  group.add(lines);

  scene.add(group);
  return { group, spheres, lines, linePositions };
}

const skeletons = {
  left:  makeSkeleton(0x00ff00),
  right: makeSkeleton(0x00ccff),
};

function updateSkeleton(skel, handData) {
  if (!handData) { skel.group.visible = false; return; }
  skel.group.visible = true;

  const { joints } = handData;
  for (let i = 0; i < joints.length; i++) {
    const j = joints[i];
    skel.spheres[i].visible = !!j;
    if (j) skel.spheres[i].position.set(j.pos[0], j.pos[1], j.pos[2]);
  }

  let p = 0;
  for (const [a, b] of BONES) {
    const ja = joints[a], jb = joints[b];
    if (ja && jb) {
      skel.linePositions[p++] = ja.pos[0]; skel.linePositions[p++] = ja.pos[1]; skel.linePositions[p++] = ja.pos[2];
      skel.linePositions[p++] = jb.pos[0]; skel.linePositions[p++] = jb.pos[1]; skel.linePositions[p++] = jb.pos[2];
    } else {
      // collapse untracked bones to a point so they don't draw
      for (let k = 0; k < 6; k++) skel.linePositions[p++] = 0;
    }
  }
  skel.lines.geometry.attributes.position.needsUpdate = true;
}

// ---------------------------------------------------------------------------
// Extract joint poses for one hand from the current XRFrame
// ---------------------------------------------------------------------------
function extractHand(frame, inputSource, refSpace) {
  if (!inputSource?.hand) return null;

  const joints = [];
  let tracked = 0;

  for (const name of JOINTS) {
    const jointSpace = inputSource.hand.get(name);
    if (jointSpace) {
      const pose = frame.getJointPose(jointSpace, refSpace);
      if (pose) {
        const { position: p, orientation: r } = pose.transform;
        joints.push({ pos: [p.x, p.y, p.z], rot: [r.x, r.y, r.z, r.w] });
        tracked++;
        continue;
      }
    }
    joints.push(null);
  }

  return tracked > 0 ? { joints, n: tracked } : null;
}

// ---------------------------------------------------------------------------
// Animation loop
// ---------------------------------------------------------------------------
let lastFpsTime = performance.now();
let fpsCount = 0;

renderer.setAnimationLoop((time, frame) => {
  // FPS counter
  fpsCount++;
  if (time - lastFpsTime >= 1000) {
    document.getElementById('fps-status').textContent = `FPS: ${fpsCount}`;
    fpsCount = 0;
    lastFpsTime = time;
  }

  const refSpace = frame ? renderer.xr.getReferenceSpace() : null;

  if (!frame || !refSpace) {
    renderer.render(scene, camera);
    return;
  }

  const payload = { frame: frameCount++, ts: Date.now() };
  let anyTracked = false;

  for (const src of frame.session.inputSources) {
    const handData = extractHand(frame, src, refSpace);
    if (!handData) continue;
    const key = src.handedness === 'right' ? 'right' : 'left';
    payload[key] = handData;
    anyTracked = true;
  }

  updateSkeleton(skeletons.left,  payload.left);
  updateSkeleton(skeletons.right, payload.right);

  renderer.render(scene, camera);

  // Overlay
  const lStr = payload.left  ? `L:${payload.left.n}`  : 'L:--';
  const rStr = payload.right ? `R:${payload.right.n}` : 'R:--';
  document.getElementById('hand-status').textContent = `Hands: ${lStr} ${rStr}`;
  lastHandCounts.left  = payload.left  ? payload.left.n  : 0;
  lastHandCounts.right = payload.right ? payload.right.n : 0;

  if (anyTracked) sendHandData({ ...payload, robotId: ROBOT_ID });
});
</script>
</body>
</html>
