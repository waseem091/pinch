name = "pinch-relay"
main = "worker.js"
compatibility_date = "2026-01-01"

[vars]
WORLD_APP_ID = "app_f13f3bcdd8e5b2bb1eca815e8e462cf1"

[[durable_objects.bindings]]
name = "RELAY"
class_name = "Relay"

# free plan requires SQLite-backed durable object classes
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Relay"]

# allow importing viewer.html as a text module
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true
